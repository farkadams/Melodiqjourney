<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNBROS Pozsony Busz 2026 | Melodiq Journey</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.logo{
    width:50%;
    max-width:250px;
    margin-bottom:5px;
}

.meetup-box{
    max-width:1100px;
    margin:-20px auto 0 auto;
    padding:15px;

    background:rgba(20,20,20,0.65);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
}

.meetup-box h2{
    font-size:28px;
    line-height:1.3;
    margin-bottom:8px;
}

.meetup-box p{
    font-size:14px !important;
    line-height:1.5 !important;
}

.form-field{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:14px;
    border:1px solid #333;
    background:#111;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

select.form-field{
    background:#111 !important;
    color:#999 !important;
    appearance:none;
    -webkit-appearance:none;
}

select.form-field option{
    background:#111;
    color:white;
}
.submit-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:white;
    color:black;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    opacity:0.9;
}

.button-row{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:30px;
}

.button{
    display:inline-block;
    width:250px;
    padding:18px;
    border:2px solid white;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-size:20px;
    transition:0.3s;
}

.button:hover{
    background:white;
    color:black;
}

@media(max-width:700px){

.meetup-box h2{
    font-size:26px;
}

.button{
    width:100%;
}
}
.hero{
    background:
    linear-gradient(
    rgba(0,0,0,.25),
    rgba(0,0,0,.25)
    ),
    url('Hero.PNG');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:auto;
    padding:80px 20px;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding-top:40px;
    padding-bottom:40px;

    max-width:1400px;
    margin:auto;
}

.hero h1{
    font-size:70px;
    margin:0;
    letter-spacing:4px;
}

.hero p{
    max-width:900px;
    font-size:22px;
    line-height:1.6;
}

.buttons{
    display:flex;
    gap:20px;
    margin-top:25px;
}

.btn{
    background:#d9c29a;
    color:black;
    text-decoration:none;
    padding:16px 40px;
    border-radius:8px;
    font-weight:bold;
}

.btn2{
    border:2px solid white;
    color:white;
    text-decoration:none;
    padding:16px 40px;
    border-radius:8px;
    font-weight:bold;
}

.navbar{
    background:#050505;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    border-bottom:1px solid #222;
}

.navlogo{
    height:55px;
}

.menu{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:13px;
    letter-spacing:1px;
}

.footer{
    text-align:center;
    padding:25px 20px;
}

.footer-logo{
    height:45px;
    margin-bottom:20px;
}

.footer-social{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}

.footer-social img{
    width:30px;
    height:30px;
    transition:.3s;
}

.footer-social img:hover{
    transform:scale(1.1);
}
.events-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
    gap:30px;
    margin-top:40px;
    max-width:1400px;
    margin-left:auto;
    margin-right:auto;
}

.event-card{
    background:rgba(15,15,15,.85);
    backdrop-filter:blur(10px);
    border-radius:20px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.15);
    transition:.3s;
}

.event-card:hover{
    transform:translateY(-5px);
}

.event-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.event-content{
    padding:20px;
}

.event-btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 24px;
    background:#d9c29a;
    color:black;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
.events-section{
    width:450px;
    margin-left:auto;
}
</style>
</head>

<body>
<nav class="navbar">

    <a href="index.html">
    <img src="logo.png" class="navlogo">
</a>

    <div class="menu">
        <a href="index.html">KEZDŐLAP</a>
        <a href="unbros.html">UNBROS UTAZÁS</a>
    </div>

</nav>
<section class="hero">

<div class="meetup-box" id="meetup">
</div>

<img src="logo.png" class="logo">

<section class="events-section">
    <h2>Közelgő események</h2>
    <div id="events-container"></div>
</section>

<div style="text-align:center;margin-top:30px;">

</section>
<footer class="footer">

<a href="index.html">
    <img src="logo.png" class="footer-logo">
</a>

<div class="footer-social">

    <a href="https://www.instagram.com/melodiq.journey/" target="_blank">
        <img src="instagram.png">
    </a>

    <a href="https://www.facebook.com/share/g/1EGuWiEpaF/?mibextid=wwXIfr" target="_blank">
        <img src="facebook.png">
    </a>

</div>

<p>© 2026 Melodiq Journey • Melodic Techno Community</p>

</footer>
<script>
fetch("https://script.google.com/macros/s/AKfycbwngvcuE5usagkNpWOvy6mbyp9nVE7f6pCuiTqehKKoQ7OTgkYbk8YD66OX054l1hs/exec")
.then(response => response.json())
.then(events => {

  const container = document.getElementById("events-container");

  events.forEach(event => {

    container.innerHTML += `
      <div class="event-card">

        <img src="${event.kepurl}" alt="${event.nev}">

        <div class="event-content">
          <h3>${event.nev}</h3>

<p>📅 ${new Date(event.datum).toLocaleDateString('hu-HU')}</p>
          <p>📍 ${event.helyszin}</p>
          <p>${event.fellepok}</p>

          <a href="${event.jegyurl}" target="_blank" class="event-btn">
            Jegyvásárlás
          </a>

        </div>

      </div>
    `;
  });

});
</script>
</body>
</html>
